<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Slider PRO</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.slider {
  width: 927px;
  height: 470px;
  position: relative;
  perspective: 1200px;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* SLICES */
.slice {
  position: absolute;
  top: 0;
  width: 33.33%;
  height: 100%;
  background-size: cover;
  transition: transform 1s ease-in-out;
}

</style>
</head>

<body>

<div class="slider" id="slider"></div>

<script>
const images = [
"cubo (1).png",
"cubo (2).png",
"cubo (3).png",
"cubo (4).png",
"cubo (5).png",
"cubo (6).png",
"cubo (7).png",
"cubo (8).png",
"cubo (9).png",
"cubo (10).png"
];

let current = 0;
const slider = document.getElementById("slider");

// crear slide base
function createSlide(src) {
  const div = document.createElement("div");
  div.className = "slide";
  div.innerHTML = `<img src="${src}">`;
  return div;
}

// crear slices
function createSlices(src) {
  const slices = [];

  for (let i = 0; i < 3; i++) {
    const s = document.createElement("div");
    s.className = "slice";

    s.style.left = (i * 33.33) + "%";
    s.style.backgroundImage = `url(${src})`;
    s.style.backgroundPosition = `${-i * 100}% 0`;

    slider.appendChild(s);
    slices.push(s);
  }

  return slices;
}

// transición
function nextSlide() {

  const next = (current + 1) % images.length;
  const type = Math.floor(Math.random() * 3);

  const currentSlide = slider.querySelector(".slide");

  // 👉 1. IZQ-DER
  if (type === 0) {
    const newSlide = createSlide(images[next]);
    newSlide.style.transform = "rotateY(-90deg)";
    slider.appendChild(newSlide);

    setTimeout(() => {
      newSlide.style.transition = "1s";
      newSlide.style.transform = "rotateY(0deg)";
      currentSlide.style.transform = "rotateY(90deg)";
    }, 50);

    setTimeout(() => {
      currentSlide.remove();
    }, 1000);
  }

  // 👉 2. ARRIBA-ABAJO
  else if (type === 1) {
    const newSlide = createSlide(images[next]);
    newSlide.style.transform = "rotateX(90deg)";
    slider.appendChild(newSlide);

    setTimeout(() => {
      newSlide.style.transition = "1s";
      newSlide.style.transform = "rotateX(0deg)";
      currentSlide.style.transform = "rotateX(-90deg)";
    }, 50);

    setTimeout(() => {
      currentSlide.remove();
    }, 1000);
  }

  // 👉 3. SLICES 🔥
  else {
    const slices = createSlices(images[next]);

    slices.forEach((s, i) => {
      s.style.transform = "rotateX(90deg)";

      setTimeout(() => {
        s.style.transform = "rotateX(0deg)";
      }, i * 200);
    });

    setTimeout(() => {
      currentSlide.querySelector("img").src = images[next];
      slices.forEach(s => s.remove());
    }, 1000);
  }

  current = next;
}

// iniciar
slider.appendChild(createSlide(images[0]));
setInterval(nextSlide, 3000);

</script>

</body>
</html>
